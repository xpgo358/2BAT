<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Examen 3</title>
  </head>
  <body>
    <!-- Examen 3: Números perfecto, deficiente y abundante -->
    <script>
      function obtenerDivisores(numero) {
        var divisores = [];
        var i;

        for (i = 1; i < numero; i++) {
          if (numero % i === 0) {
            divisores.push(i);
          }
        }
        return divisores;
      }

      function sumarArray(array) {
        var suma = 0;
        var i;

        for (i = 0; i < array.length; i++) {
          suma = suma + array[i];
        }
        return suma;
      }

      function clasificarNumero(numero) {
        var divisores = obtenerDivisores(numero);
        var sumaDivisores = sumarArray(divisores);
        var clasificacion = "";

        if (sumaDivisores < numero) {
          clasificacion = "Deficiente";
        } else if (sumaDivisores > numero) {
          clasificacion = "Abundante";
        } else {
          clasificacion = "Perfecto";
        }
        return clasificacion;
      }

      var numero = parseInt(prompt("Introduce un número positivo:", ""));

      while (isNaN(numero) || numero <= 0) {
        numero = parseInt(
          prompt("Introduce un número válido mayor que 0:", ""),
        );
      }

      var resultado = clasificarNumero(numero);
      document.write("El número " + numero + " es " + resultado);
    </script>
  </body>
</html>
